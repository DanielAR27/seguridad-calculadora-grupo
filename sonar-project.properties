# Clave y nombre del proyecto
sonar.projectKey=calculadora-financiera
sonar.projectName=Calculadora Financiera
sonar.projectVersion=1.0
sonar.host.url=http://localhost:9000

# Directorios de código fuente a analizar (separados por coma)
sonar.sources=frontend/src,backend/src

# Directorios o archivos a excluir del análisis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.test.jsx,**/*.spec.js

# Especificar la codificación
sonar.sourceEncoding=UTF-8

# Lenguajes principales
sonar.language=js,jsx

# Token de autenticación
sonar.token=TOKEN_GENERADO


